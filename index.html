<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>MyFinance</title>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="imagens/logo.png" alt="Logo de um porquinho de cofrinho azul com branco">
            <h1>MyFinance</h1>
        </div>

        <nav>
            <label for="menu">
                <img class="icone-menu" src="imagens/menu.svg" alt="">
            </label>
            
            <input type="checkbox" id="menu" name="menu" value="accepted" hidden>
            <a href="#">Recursos</a>
            <a href="#">Sobre</a>
            <a href="#">Login</a>
            <a href="#">Criar conta</a>
        </nav>
    </header>

    <main>

        <section class="intro-section">

            <div class="headline-container">

                <div class="pre-title">
                    <p>Gestão financeira inteligente</p>
                </div>

                <h2>Controle suas finanças de forma <span>simples e eficaz</span></h2>
                <p>Organize seus gastos, planeje seu futuro e alcance seus objetivos 
                    financeiros com a melhor ferramenta do mercado.</p>
                <a class="button" href="#">Criar Conta</a>

            </div>

        </section>


    </main>

    <footer>


    </footer>
    
</body>
</html>
